<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Atendimento</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0f0f12;--surface:#17171d;--surface2:#1e1e27;--border:#2a2a38;--text:#e8e8f0;--muted:#6b6b80;--accent:#6c63ff;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.header-actions{display:flex;gap:10px;align-items:center;}
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:#5a52e0;border-color:#5a52e0;color:#fff;}
.btn-sm{padding:5px 10px;font-size:12px;}
.config-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:none;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.config-panel.open{display:flex;}
.config-field{display:flex;flex-direction:column;gap:4px;}
.config-field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.config-field input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-size:13px;font-family:'DM Mono',monospace;width:280px;}
.config-field input:focus{outline:none;border-color:var(--accent);}
.main{padding:20px 24px;}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.summary-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.summary-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.summary-card .lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-bottom:6px;}
.summary-card .cnt{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;}
.summary-card .sub{font-size:10px;color:var(--muted);margin-top:4px;}
.s-total::before{background:var(--accent);}.s-total .cnt{color:var(--accent);}
.s-inc::before{background:var(--red);}.s-inc .cnt{color:var(--red);}
.s-ta::before{background:var(--yellow);}.s-ta .cnt{color:var(--yellow);}
.s-tat::before{background:var(--red);}.s-tat .cnt{color:var(--red);}
.s-ad::before{background:var(--purple);}.s-ad .cnt{color:var(--purple);}
.s-ae::before{background:var(--blue);}.s-ae .cnt{color:var(--blue);}
.s-pe::before{background:var(--orange);}.s-pe .cnt{color:var(--orange);}
.s-ar::before{background:var(--cyan);}.s-ar .cnt{color:var(--cyan);}
.s-ea::before{background:var(--red);}.s-ea .cnt{color:var(--red);}
.s-av::before{background:var(--green);}.s-av .cnt{color:var(--green);}
.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;}
.search-box:focus{outline:none;border-color:var(--accent);}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;cursor:pointer;}
.filter-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.filter-btn.on{border-color:var(--red);color:var(--red);background:#ef444415;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.table-wrap table{width:100%;border-collapse:collapse;}
.table-wrap th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);font-weight:600;white-space:nowrap;}
.table-wrap td{padding:11px 14px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle;}
.table-wrap tr:hover td{background:#1a1a24;}
.mono{font-family:'DM Mono',monospace;font-size:12px;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bTA{background:#f59e0b20;color:var(--yellow);border:1px solid #f59e0b40;}
.bTAT{background:#ef444420;color:var(--red);border:1px solid #ef444440;}
.bAD{background:#a855f720;color:var(--purple);border:1px solid #a855f740;}
.bAE{background:#3b82f620;color:var(--blue);border:1px solid #3b82f640;}
.bPE{background:#f9731620;color:var(--orange);border:1px solid #f9731640;}
.bAR{background:#06b6d420;color:var(--cyan);border:1px solid #06b6d440;}
.bEA{background:#ef444420;color:var(--red);border:1px solid #ef444440;}
.bAV{background:#22c55e20;color:var(--green);border:1px solid #22c55e40;}
.bOK{background:#22c55e20;color:var(--green);border:1px solid #22c55e40;}
.bDEF{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.ct{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;font-family:'DM Mono',monospace;}
.cML{background:#f59e0b20;color:var(--yellow);}
.cSP{background:#f9731620;color:var(--orange);}
.cAZ{background:#06b6d420;color:var(--cyan);}
.cMG{background:#3b82f620;color:var(--blue);}
.cCX{background:#a855f720;color:var(--purple);}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.pgb{display:flex;gap:6px;}
.pb{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer;font-size:12px;}
.pb:hover{border-color:var(--accent);}
.pb.on{background:var(--accent);border-color:var(--accent);}
.pb:disabled{opacity:0.4;cursor:not-allowed;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:800px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.mhdr{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mtit{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.msub{font-size:12px;color:var(--muted);margin-top:2px;}
.mclose{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;}
.mclose:hover{color:var(--text);}
.mbody{flex:1;overflow-y:auto;padding:18px 24px;}
.mftr{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;}
.sec{margin-bottom:18px;}
.stit{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.stit::after{content:'';flex:1;height:1px;background:var(--border);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;display:flex;align-items:center;gap:3px;}
.req{color:var(--red);font-size:10px;}
.f input,.f select,.f textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 11px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;transition:border-color 0.15s;width:100%;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--accent);}
.f input.err,.f select.err{border-color:var(--red)!important;}
.f input[readonly]{color:var(--muted);cursor:default;font-style:italic;}
.rg{display:flex;gap:6px;flex-wrap:wrap;}
.ro input[type=radio]{display:none;}
.ro label{padding:5px 11px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);transition:all 0.15s;text-transform:none;letter-spacing:0;}
.ro input[type=radio]:checked+label{border-color:var(--accent);color:var(--accent);background:#6c63ff15;}
.miss-box{background:#ef444415;border:1px solid #ef444430;border-radius:8px;padding:9px 13px;margin-bottom:14px;font-size:12px;color:#fca5a5;}
.miss-box strong{display:block;margin-bottom:3px;}
.auto-box{background:#22c55e10;border:1px solid #22c55e30;border-radius:8px;padding:8px 13px;margin-bottom:12px;font-size:12px;color:#86efac;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:16px;color:var(--muted);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:60px;color:var(--muted);}
.empty .ic{font-size:36px;margin-bottom:10px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:#fca5a5;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Central<span>.</span>Atendimento</div>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="toggleCfg()">⚙ Configurar</button>
    <button class="btn btn-sm" onclick="loadData()">↻ Atualizar</button>
    <button class="btn btn-primary btn-sm" onclick="openModal(null)">+ Novo</button>
  </div>
</div>

<div class="config-panel" id="cfgPanel">
  <div class="config-field"><label>ID da Planilha</label><input id="sheetId" placeholder="1cDH2mXl..."/></div>
  <div class="config-field"><label>Nome da Aba</label><input id="sheetName" value="ATENDIMENTOS" style="width:180px"/></div>
  <div class="config-field"><label>API Key</label><input id="apiKey" type="password" placeholder="AIza..." style="width:200px"/></div>
  <div class="config-field"><label>Client ID OAuth</label><input id="clientId" placeholder="123....apps.googleusercontent.com"/></div>
  <button class="btn btn-primary" onclick="saveCfg()">Salvar e Carregar</button>
</div>

<div class="main">
  <div class="summary" id="summary"></div>
  <div class="toolbar">
    <input class="search-box" id="srch" placeholder="🔍 Buscar ID, nome, SKU..." oninput="render()">
    <select class="filter-select" id="fStatus" onchange="render()">
      <option value="">Todos os status ativos</option>
      <option>TRATATIVA ABERTA</option><option>TRATATIVA ATRASADA</option>
      <option>ACOMPANHAR DISPUTA</option><option>ACOMPANHAR ENVIO</option>
      <option>POSSÍVEL EXTRAVIO</option><option>AGUARDANDO REEMBOLSO</option>
      <option>EM ATRASO</option><option>A ENVIAR</option>
    </select>
    <select class="filter-select" id="fCanal" onchange="render()">
      <option value="">Todos os canais</option>
      <option>Mercado Livre</option><option>Shopee</option>
      <option>Amazon</option><option>Magalu</option><option>Cardex</option>
    </select>
    <button class="filter-btn" id="btnMiss" onclick="toggleMiss()">⚠ Incompletos</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Status</th><th>ID Venda</th><th>Nome</th><th>Canal</th>
        <th>Modalidade</th><th>SKU</th><th>Data</th><th>Ações</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="pagination" id="pag"></div>
  </div>
</div>

<div class="modal-overlay" id="mOverlay">
  <div class="modal">
    <div class="mhdr">
      <div><div class="mtit" id="mTit">Novo Registro</div><div class="msub" id="mSub"></div></div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="mBody"></div>
    <div class="mftr">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecord()">💾 Salvar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══ MAPEAMENTO EXATO (baseado no cabeçalho fornecido) ══
// A=0  STATUS                        ← fórmula
// B=1  Modalidade
// C=2  ID Venda
// D=3  Nome                          ← fórmula XLOOKUP
// E=4  Canal De Venda
// F=5  EMPR.
// G=6  Modelo
// H=7  Data da Venda                 ← fórmula XLOOKUP
// I=8  SKU                           ← fórmula XLOOKUP
// J=9  QT                            ← fórmula XLOOKUP
// K=10 Rastreio                      ← fórmula XLOOKUP
// L=11 ID Venda no Bling             ← fórmula XLOOKUP
// M=12 Descrição de Status           ← fórmula XLOOKUP
// N=13 Necessário NF Devol?
// O=14 NF
// P=15 NF DEVOL
// Q=16 NF DEVOL (Emissão)
// R=17 AUTOR
// S=18 Motivo Reclamação do Cliente
// T=19 Detalhamento da Reclamação
// U=20 Observações da Reclamação
// V=21 DATA Tratativa
// W=22 Nº Reclamação Cliente
// X=23 Teve Impacto na Reputação?
// Y=24 Cliente reembolsado?
// Z=25 Aberto o processo de devolução?
// AA=26 Necessário Enviar Peças?
// AB=27 Enviadas Peças para Cliente?
// AC=28 Observação do envio de peças
// AD=29 Reenvio recebido pelo cliente?
// AE=30 Custo de Envio
// AF=31 Pago a Plataforma ou Cliente
// AG=32 Valor Pago a Plataforma (TESTE)
// AH=33 Custos Total
// AI=34 Tratativa FINALIZADA?
// AJ=35 Observações Relevantes
// AK=36 STATUS FINAL FULL
// AL=37 CHEGOU NA CARDEX?
// AM=38 Disputa Aberta?
// AN=39 Plataforma Disputa
// AO=40 Motivo da Disputa
// AP=41 Protocolo Atendimento
// AQ=42 R$ Crédito?
// AR=43 ID Transação
// AS=44 Reembolso do Marketplace?
// AT=45 Disputa Finalizada?
// AU=46 R$ Crédito Recebido
// AV=47 Crédito Recebido?
// AW=48 Observações da Disputa
// AX=49 NFs Devolução Total
// AY=50 Valor da NF
// AZ=51 Imposto Resgatado
// BA=52 Custos Totais
// BB=53 Reembolso
// BC=54 Resultado Financeiro da Reclamação
// BD=55 STATUS 2

const COL={
  STATUS:0,MODALIDADE:1,ID_VENDA:2,NOME:3,CANAL:4,EMPR:5,MODELO:6,
  DATA_VENDA:7,SKU:8,QT:9,RASTREIO:10,ID_BLING:11,DESC_STATUS:12,
  NEC_NF_DEVOL:13,NF:14,NF_DEVOL:15,NF_DEVOL_EMISSAO:16,AUTOR:17,
  MOTIVO:18,DETALHAMENTO:19,OBS_RECLAM:20,DATA_TRATATIVA:21,
  NUM_RECLAM:22,REPUTACAO:23,REEMBOLSADO:24,DEVOLUCAO_ABERTA:25,
  NEC_PECAS:26,PECAS_ENVIADAS:27,OBS_PECAS:28,REENVIO_RECEBIDO:29,
  CUSTO_ENVIO:30,PAGO_PLAT:31,VALOR_PAGO:32,CUSTOS_TOTAL:33,
  TRATATIVA_FINALIZADA:34,OBS_RELEVANTES:35,STATUS_FULL:36,
  CHEGOU_CARDEX:37,DISPUTA_ABERTA:38,PLAT_DISPUTA:39,MOTIVO_DISPUTA:40,
  PROTOCOLO:41,CREDITO:42,ID_TRANSACAO:43,REEMBOLSO_MKT:44,
  DISPUTA_FINALIZADA:45,CREDITO_RECEBIDO_VALOR:46,CREDITO_RECEBIDO:47,
  OBS_DISPUTA:48
};

// Colunas que são fórmulas — NUNCA sobrescrever
const FORMULA_COLS=new Set([0,3,7,8,9,10,11,12]);

// Colunas editáveis pelo app
const EDIT_COLS=Object.entries(COL)
  .filter(([,i])=>!FORMULA_COLS.has(i))
  .map(([k,i])=>({key:k,idx:i}));

const IGNORADOS=['CONCLUÍDO','AGUARDANDO PRODUTO',''];

let cfg={
  sheetId:localStorage.getItem('sheetId')||'',
  sheetName:localStorage.getItem('sheetName')||'ATENDIMENTOS',
  apiKey:localStorage.getItem('apiKey')||'',
  clientId:localStorage.getItem('clientId')||''
};
let allData=[],filtered=[],curRec=null,page=1,missOnly=false;
const PG=20;

window.onload=()=>{
  ['sheetId','sheetName','apiKey','clientId'].forEach(k=>{
    document.getElementById(k).value=cfg[k];
  });
  if(cfg.sheetId&&cfg.apiKey) loadData();
  else document.getElementById('cfgPanel').classList.add('open');
};

function toggleCfg(){document.getElementById('cfgPanel').classList.toggle('open');}

function saveCfg(){
  ['sheetId','sheetName','apiKey','clientId'].forEach(k=>{
    cfg[k]=document.getElementById(k).value.trim();
    localStorage.setItem(k,cfg[k]);
  });
  document.getElementById('cfgPanel').classList.remove('open');
  loadData();
}

async function loadData(){
  if(!cfg.sheetId||!cfg.apiKey){document.getElementById('cfgPanel').classList.add('open');return;}
  document.getElementById('tbody').innerHTML=
    '<tr><td colspan="8"><div class="loading"><div class="spinner"></div><span>Carregando...</span></div></td></tr>';
  try{
    const rng=encodeURIComponent(`${cfg.sheetName}!A2:BD`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${rng}?key=${cfg.apiKey}`;
    const res=await fetch(url);
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
    const rows=(await res.json()).values||[];
    allData=rows.map((row,i)=>{
      const r={_row:i+2,_raw:[...row]};
      Object.entries(COL).forEach(([k,ci])=>{r[k]=row[ci]||'';});
      return r;
    });
    renderSummary();render();
    toast(`${allData.length} registros carregados`,'ok');
  }catch(e){
    document.getElementById('tbody').innerHTML=
      `<tr><td colspan="8"><div class="empty"><div class="ic">⚠️</div><div style="color:#fca5a5">${e.message}</div></div></td></tr>`;
    toast(e.message,'err');
  }
}

const SL=[
  {k:'TRATATIVA ATRASADA',c:'tat',l:'ATRASADA'},
  {k:'TRATATIVA ABERTA',c:'ta',l:'ABERTA'},
  {k:'ACOMPANHAR DISPUTA',c:'ad',l:'DISPUTA'},
  {k:'ACOMPANHAR ENVIO',c:'ae',l:'ENVIO'},
  {k:'POSSÍVEL EXTRAVIO',c:'pe',l:'EXTRAVIO'},
  {k:'AGUARDANDO REEMBOLSO',c:'ar',l:'REEMBOLSO'},
  {k:'EM ATRASO',c:'ea',l:'EM ATRASO'},
  {k:'A ENVIAR',c:'av',l:'A ENVIAR'},
];

function renderSummary(){
  const ativos=allData.filter(r=>!IGNORADOS.includes(r.STATUS));
  const inc=ativos.filter(r=>getMiss(r).length>0);
  let h=`
    <div class="summary-card s-total" onclick="clearF()">
      <div class="lbl">Total Ativos</div><div class="cnt">${ativos.length}</div><div class="sub">pendentes</div>
    </div>
    <div class="summary-card s-inc" onclick="setMiss(true)">
      <div class="lbl">Incompletos</div><div class="cnt">${inc.length}</div><div class="sub">campos faltando</div>
    </div>`;
  SL.forEach(s=>{
    const n=ativos.filter(r=>r.STATUS===s.k).length;
    if(!n)return;
    h+=`<div class="summary-card s-${s.c}" onclick="setSt('${s.k}')">
      <div class="lbl">${s.l}</div><div class="cnt">${n}</div><div class="sub">registros</div>
    </div>`;
  });
  document.getElementById('summary').innerHTML=h;
}

function setSt(s){document.getElementById('fStatus').value=s;missOnly=false;document.getElementById('btnMiss').classList.remove('on');render();}
function setMiss(v){missOnly=v;document.getElementById('btnMiss').classList.toggle('on',v);render();}
function toggleMiss(){setMiss(!missOnly);}
function clearF(){document.getElementById('fStatus').value='';document.getElementById('fCanal').value='';document.getElementById('srch').value='';missOnly=false;document.getElementById('btnMiss').classList.remove('on');render();}

function render(){
  const s=document.getElementById('srch').value.toLowerCase();
  const sf=document.getElementById('fStatus').value;
  const cf=document.getElementById('fCanal').value;
  filtered=allData.filter(r=>{
    if(IGNORADOS.includes(r.STATUS))return false;
    if(sf&&r.STATUS!==sf)return false;
    if(cf&&r.CANAL!==cf)return false;
    if(missOnly&&getMiss(r).length===0)return false;
    if(s&&!`${r.ID_VENDA} ${r.NOME} ${r.SKU} ${r.CANAL} ${r.MODALIDADE}`.toLowerCase().includes(s))return false;
    return true;
  });
  const tot=filtered.length;
  const tp=Math.ceil(tot/PG)||1;
  if(page>tp)page=1;
  const st=(page-1)*PG;
  const pg=filtered.slice(st,st+PG);

  if(!pg.length){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8"><div class="empty"><div class="ic">📭</div><div>Nenhum registro</div></div></td></tr>';
    document.getElementById('pag').innerHTML='';return;
  }

  const BC={
    'TRATATIVA ABERTA':'bTA','TRATATIVA ATRASADA':'bTAT','ACOMPANHAR DISPUTA':'bAD',
    'ACOMPANHAR ENVIO':'bAE','POSSÍVEL EXTRAVIO':'bPE','AGUARDANDO REEMBOLSO':'bAR',
    'EM ATRASO':'bEA','A ENVIAR':'bAV','CONCLUÍDO':'bOK'
  };
  const CC={'Mercado Livre':'cML','Shopee':'cSP','Amazon':'cAZ','Magalu':'cMG','Cardex':'cCX'};

  let h='';
  pg.forEach(r=>{
    const m=getMiss(r).length;
    const bc=BC[r.STATUS]||'bDEF';
    const cc=CC[r.CANAL]||'';
    const enc=encodeURIComponent(JSON.stringify(r));
    h+=`<tr>
      <td>
        <div class="badge ${bc}">${r.STATUS||'—'}</div>
        ${m?`<div style="font-size:10px;color:var(--red);margin-top:3px">⚠ ${m} campo(s)</div>`:''}
      </td>
      <td class="mono">${r.ID_VENDA||'—'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.NOME||'—'}</td>
      <td><span class="ct ${cc}">${r.CANAL||'—'}</span></td>
      <td>${r.MODALIDADE||'—'}</td>
      <td class="mono" style="font-size:11px">${r.SKU||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${r.DATA_VENDA||'—'}</td>
      <td><button class="btn btn-sm" onclick="openModal(JSON.parse(decodeURIComponent('${enc}')))">✏ Editar</button></td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML=h;

  let p=`<span>${st+1}–${Math.min(st+PG,tot)} de ${tot}</span><div class="pgb">`;
  p+=`<button class="pb" onclick="goP(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=tp;i++){
    if(tp<=7||i===1||i===tp||Math.abs(i-page)<=1)
      p+=`<button class="pb ${i===page?'on':''}" onclick="goP(${i})">${i}</button>`;
    else if(Math.abs(i-page)===2)p+=`<button class="pb" disabled>…</button>`;
  }
  p+=`<button class="pb" onclick="goP(${page+1})" ${page===tp?'disabled':''}>›</button></div>`;
  document.getElementById('pag').innerHTML=p;
}

function goP(p){const tp=Math.ceil(filtered.length/PG)||1;if(p<1||p>tp)return;page=p;render();}

function getMiss(r){
  const m=[];
  ['ID_VENDA','CANAL','EMPR','MODELO','DEVOLUCAO_ABERTA','NEC_PECAS','DISPUTA_ABERTA','TRATATIVA_FINALIZADA'].forEach(f=>{if(!r[f])m.push(f);});
  if(['Devolução','Mensagem','Reclamação'].includes(r.MODALIDADE)&&!r.MOTIVO)m.push('MOTIVO');
  if(r.DISPUTA_ABERTA==='SIM'&&!r.DISPUTA_FINALIZADA)m.push('DISPUTA_FINALIZADA');
  if(r.DISPUTA_FINALIZADA==='SIM'&&!r.REEMBOLSO_MKT)m.push('REEMBOLSO_MKT');
  if(r.REEMBOLSO_MKT==='SIM'&&!r.CREDITO)m.push('CREDITO');
  return m;
}

function fi(id,lbl,val,type='text',req=false,ph=''){
  const e=req&&!val?'err':'';
  return `<div class="f"><label>${lbl}${req?'<span class="req">*</span>':''}</label>
    <input type="${type}" id="f_${id}" value="${(val||'').replace(/"/g,'&quot;')}" placeholder="${ph}" class="${e}"></div>`;
}
function fr(id,lbl,val){
  return `<div class="f"><label>${lbl}</label>
    <input type="text" id="f_${id}" value="${(val||'').replace(/"/g,'&quot;')}" readonly></div>`;
}
function fs(id,lbl,val,opts,req=false){
  const e=req&&!val?'err':'';
  const o=opts.map(v=>`<option value="${v}" ${val===v?'selected':''}>${v||'— Selecione —'}</option>`).join('');
  return `<div class="f"><label>${lbl}${req?'<span class="req">*</span>':''}</label>
    <select id="f_${id}" class="${e}">${o}</select></div>`;
}
function fy(id,lbl,val,req=false){
  const b=req&&!val?'border:1px solid var(--red);border-radius:7px;padding:6px;':'';
  const mk=(v,l)=>`<div class="ro"><input type="radio" name="f_${id}" id="f_${id}_${v}" value="${v}" ${val===v?'checked':''}><label for="f_${id}_${v}">${l}</label></div>`;
  return `<div class="f" style="${b}"><label>${lbl}${req?'<span class="req">*</span>':''}</label>
    <div class="rg">${mk('SIM','SIM')}${mk('NÃO','NÃO')}</div></div>`;
}

function closeModal(){document.getElementById('mOverlay').classList.remove('open');curRec=null;}

// ══ SAVE — batchUpdate: apenas células alteradas, preserva fórmulas ══
async function saveRecord(){
  const get=id=>{
    const el=document.getElementById(`f_${id}`);
    if(el)return el.value;
    for(const r of document.querySelectorAll(`input[name="f_${id}"]`))if(r.checked)return r.value;
    return '';
  };

  const novos={};
  EDIT_COLS.forEach(({key})=>{novos[key]=get(key)||'';});

  // Validação
  const miss=['ID_VENDA','CANAL','EMPR','MODELO','DEVOLUCAO_ABERTA','NEC_PECAS','DISPUTA_ABERTA','TRATATIVA_FINALIZADA'].filter(f=>!novos[f]);
  if(['Devolução','Mensagem','Reclamação'].includes(novos.MODALIDADE)&&!novos.MOTIVO)miss.push('MOTIVO');
  if(novos.DISPUTA_ABERTA==='SIM'&&!novos.DISPUTA_FINALIZADA)miss.push('DISPUTA_FINALIZADA');
  if(novos.DISPUTA_FINALIZADA==='SIM'&&!novos.REEMBOLSO_MKT)miss.push('REEMBOLSO_MKT');
  if(novos.REEMBOLSO_MKT==='SIM'&&!novos.CREDITO)miss.push('CREDITO');
  if(miss.length){toast(`Preencha: ${miss.map(f=>ML[f]||f).join(', ')},'err'`);return;}

  const tkn=await getToken();
  if(!tkn){toast('Configure o Client ID OAuth para salvar','err');return;}

  const isNew=!curRec;

  if(isNew){
    // Novo: array completo sem sobrescrever colunas de fórmula
    const mx=Math.max(...Object.values(COL))+1;
    const row=new Array(mx).fill('');
    EDIT_COLS.forEach(({key,idx})=>{row[idx]=novos[key]||'';});
    try{
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${encodeURIComponent(cfg.sheetName+'!A:BD')}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${tkn}`},body:JSON.stringify({values:[row]})});
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
      toast('Registro criado!','ok');closeModal();loadData();
    }catch(e){toast('Erro: '+e.message,'err');}
  } else {
    // Edição: batchUpdate somente nas células que mudaram
    const rowN=curRec._row;
    const data=[];
    EDIT_COLS.forEach(({key,idx})=>{
      const oldV=curRec[key]||'';
      const newV=novos[key]||'';
      if(oldV===newV)return;
      data.push({range:`${cfg.sheetName}!${n2c(idx)}${rowN}`,values:[[newV]]});
    });
    if(!data.length){toast('Nenhuma alteração detectada','ok');closeModal();return;}
    try{
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values:batchUpdate`;
      const res=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${tkn}`},
        body:JSON.stringify({valueInputOption:'USER_ENTERED',data})
      });
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
      toast(`${data.length} campo(s) salvos!`,'ok');closeModal();loadData();
    }catch(e){toast('Erro: '+e.message,'err');}
  }
}

// índice numérico → letra de coluna (0=A, 25=Z, 26=AA...)
function n2c(n){
  let s='';n++;
  while(n>0){n--;s=String.fromCharCode(65+(n%26))+s;n=Math.floor(n/26);}
  return s;
}

// ══ OAUTH ══
async function getToken(){
  const st=sessionStorage.getItem('gToken');
  if(st)return st;
  if(!cfg.clientId){toast('Informe o Client ID OAuth','err');return null;}
  return new Promise(resolve=>{
    const sc='https://www.googleapis.com/auth/spreadsheets';
    const uri=window.location.origin+window.location.pathname;
    const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${cfg.clientId}&redirect_uri=${encodeURIComponent(uri)}&response_type=token&scope=${encodeURIComponent(sc)}`;
    const pop=window.open(url,'oauth','width=500,height=600');
    const iv=setInterval(()=>{
      try{
        const h=pop?.location?.hash;
        if(h?.includes('access_token')){
          const t=new URLSearchParams(h.replace('#','?')).get('access_token');
          sessionStorage.setItem('gToken',t);pop.close();clearInterval(iv);resolve(t);
        }
      }catch(e){}
      if(pop?.closed){clearInterval(iv);resolve(null);}
    },500);
  });
}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3500);
}
