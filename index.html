<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIDSY — Central de Atendimento</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══ GOOGLE MATERIAL DESIGN TOKENS ══════════════════════════════════════════ */
:root {
  --md-sys-color-primary: #1a73e8;
  --md-sys-color-on-primary: #fff;
  --md-sys-color-primary-container: #d2e3fc;
  --md-sys-color-secondary: #5f6368;
  --md-sys-color-surface: #fff;
  --md-sys-color-surface-variant: #f1f3f4;
  --md-sys-color-on-surface: #202124;
  --md-sys-color-on-surface-variant: #5f6368;
  --md-sys-color-outline: #dadce0;
  --md-sys-color-outline-variant: #e8eaed;
  --md-sys-color-error: #d93025;
  --md-sys-color-error-container: #fce8e6;
  --md-sys-color-warning: #f9ab00;
  --md-sys-color-warning-container: #fef7e0;
  --md-sys-color-success: #1e8e3e;
  --md-sys-color-success-container: #e6f4ea;
  --md-sys-color-info: #1a73e8;
  --md-sys-color-info-container: #d2e3fc;
  --md-elevation-1: 0 1px 2px rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);
  --md-elevation-2: 0 1px 2px rgba(60,64,67,.3),0 2px 6px 2px rgba(60,64,67,.15);
  --md-elevation-3: 0 4px 8px 3px rgba(60,64,67,.15),0 1px 3px rgba(60,64,67,.3);
  --md-border-radius: 8px;
  --md-border-radius-lg: 12px;
  --md-border-radius-xl: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Roboto', 'Google Sans', sans-serif;
  background: #f8f9fa;
  color: var(--md-sys-color-on-surface);
  font-size: 14px;
  line-height: 1.5;
}

/* ══ TOP APP BAR ═══════════════════════════════════════════════════════════ */
.app-bar {
  background: var(--md-sys-color-surface);
  border-bottom: 1px solid var(--md-sys-color-outline);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 16px;
}
.app-bar-logo { height: 40px; object-fit: contain; }
.app-bar-divider { width: 1px; height: 28px; background: var(--md-sys-color-outline); }
.app-bar-title {
  font-family: 'Google Sans', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--md-sys-color-on-surface);
  flex: 1;
}
.app-bar-actions { display: flex; gap: 8px; align-items: center; }

/* ══ NAVIGATION TABS ═══════════════════════════════════════════════════════ */
.nav-tabs {
  background: var(--md-sys-color-surface);
  border-bottom: 1px solid var(--md-sys-color-outline);
  display: flex;
  padding: 0 24px;
}
.nav-tab {
  padding: 14px 20px;
  font-family: 'Google Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--md-sys-color-on-surface-variant);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color .2s, border-color .2s;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.nav-tab:hover { color: var(--md-sys-color-primary); background: #f8f9fa; }
.nav-tab.active { color: var(--md-sys-color-primary); border-bottom-color: var(--md-sys-color-primary); }
.nav-tab .tab-count {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-primary);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
}

/* ══ BUTTONS ════════════════════════════════════════════════════════════════ */
.btn {
  font-family: 'Google Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  transition: box-shadow .2s, background .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn-filled {
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
}
.btn-filled:hover { box-shadow: var(--md-elevation-2); background: #1557b0; }
.btn-tonal {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-primary);
}
.btn-tonal:hover { box-shadow: var(--md-elevation-1); }
.btn-outlined {
  background: transparent;
  border: 1px solid var(--md-sys-color-outline);
  color: var(--md-sys-color-primary);
}
.btn-outlined:hover { background: var(--md-sys-color-primary-container); }
.btn-text {
  background: transparent;
  color: var(--md-sys-color-primary);
  padding: 8px 12px;
}
.btn-text:hover { background: var(--md-sys-color-primary-container); }
.btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 16px; }

/* ══ CHIPS ══════════════════════════════════════════════════════════════════ */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Google Sans', sans-serif;
  white-space: nowrap;
}
.chip-tratativa-aberta { background: #fef7e0; color: #b06000; }
.chip-tratativa-atrasada { background: #fce8e6; color: #d93025; }
.chip-acompanhar-disputa { background: #f3e8fd; color: #7627bb; }
.chip-acompanhar-envio { background: #d2e3fc; color: #1a73e8; }
.chip-possivel-extravio { background: #fce8e6; color: #d93025; }
.chip-aguardando-reembolso { background: #e6f4ea; color: #1e8e3e; }
.chip-em-atraso { background: #fce8e6; color: #d93025; }
.chip-a-enviar { background: #e6f4ea; color: #1e8e3e; }
.chip-concluido { background: #e6f4ea; color: #1e8e3e; }
.chip-canal {
  background: var(--md-sys-color-surface-variant);
  color: var(--md-sys-color-on-surface-variant);
  font-size: 11px;
  border-radius: 4px;
}

/* ══ SUMMARY CARDS ══════════════════════════════════════════════════════════ */
.summary-row {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: wrap;
}
.summary-row::-webkit-scrollbar { display: none; }
.summary-card {
  background: var(--md-sys-color-surface);
  border: 1px solid var(--md-sys-color-outline);
  border-radius: var(--md-border-radius-lg);
  padding: 14px 18px;
  min-width: 130px;
  cursor: pointer;
  transition: box-shadow .2s, border-color .2s;
  flex: 1;
}
.summary-card:hover { box-shadow: var(--md-elevation-2); border-color: var(--md-sys-color-primary); }
.summary-card.active { border-color: var(--md-sys-color-primary); background: var(--md-sys-color-primary-container); }
.sc-label { font-size: 11px; color: var(--md-sys-color-on-surface-variant); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; font-weight: 500; }
.sc-count { font-family: 'Google Sans', sans-serif; font-size: 28px; font-weight: 500; color: var(--md-sys-color-on-surface); }
.sc-total .sc-count { color: var(--md-sys-color-primary); }
.sc-error .sc-count { color: var(--md-sys-color-error); }
.sc-warn .sc-count { color: #f9ab00; }
.sc-ok .sc-count { color: var(--md-sys-color-success); }
.sc-info .sc-count { color: var(--md-sys-color-info); }
.sc-purple .sc-count { color: #7627bb; }

/* ══ TOOLBAR ════════════════════════════════════════════════════════════════ */
.toolbar {
  padding: 12px 24px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--md-sys-color-surface);
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
}
.search-field {
  flex: 1;
  min-width: 200px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--md-sys-color-surface-variant);
  border-radius: 24px;
  padding: 8px 16px;
  border: 1px solid transparent;
  transition: border-color .2s, background .2s;
}
.search-field:focus-within {
  background: var(--md-sys-color-surface);
  border-color: var(--md-sys-color-primary);
  box-shadow: var(--md-elevation-1);
}
.search-field input {
  border: none;
  background: transparent;
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  color: var(--md-sys-color-on-surface);
  outline: none;
  width: 100%;
}
.search-field input::placeholder { color: var(--md-sys-color-on-surface-variant); }
.search-icon { color: var(--md-sys-color-on-surface-variant); font-size: 18px; }
.select-field {
  background: var(--md-sys-color-surface);
  border: 1px solid var(--md-sys-color-outline);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 13px;
  font-family: 'Google Sans', sans-serif;
  color: var(--md-sys-color-on-surface);
  cursor: pointer;
  outline: none;
}
.select-field:focus { border-color: var(--md-sys-color-primary); }
.filter-chip-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--md-sys-color-outline);
  background: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface-variant);
  font-size: 13px;
  font-family: 'Google Sans', sans-serif;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.filter-chip-btn.active {
  background: var(--md-sys-color-error-container);
  border-color: var(--md-sys-color-error);
  color: var(--md-sys-color-error);
}

/* ══ DATA TABLE ═════════════════════════════════════════════════════════════ */
.table-container {
  margin: 16px 24px;
  background: var(--md-sys-color-surface);
  border: 1px solid var(--md-sys-color-outline);
  border-radius: var(--md-border-radius-lg);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--md-sys-color-surface-variant);
  padding: 12px 16px;
  text-align: left;
  font-size: 12px;
  font-weight: 500;
  color: var(--md-sys-color-on-surface-variant);
  text-transform: uppercase;
  letter-spacing: .6px;
  white-space: nowrap;
  border-bottom: 1px solid var(--md-sys-color-outline);
}
tbody td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  font-size: 13px;
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8f9fa; }
.mono { font-family: 'Roboto Mono', monospace; font-size: 12px; }
.miss-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--md-sys-color-error);
  margin-top: 3px;
}

/* ══ PAGINATION ═════════════════════════════════════════════════════════════ */
.pagination {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  padding: 10px 16px;
  border-top: 1px solid var(--md-sys-color-outline-variant);
  font-size: 12px;
  color: var(--md-sys-color-on-surface-variant);
}
.pg-info { margin-right: 12px; }
.pg-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
.pg-btn:hover { background: var(--md-sys-color-surface-variant); }
.pg-btn.active { background: var(--md-sys-color-primary); color: #fff; }
.pg-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ══ DIALOG / MODAL ═════════════════════════════════════════════════════════ */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.dialog-overlay.open { display: flex; }
.dialog {
  background: var(--md-sys-color-surface);
  border-radius: var(--md-border-radius-xl);
  width: 100%;
  max-width: 780px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--md-elevation-3);
  overflow: hidden;
}
.dialog-header {
  padding: 20px 24px 0;
  flex-shrink: 0;
}
.dialog-title {
  font-family: 'Google Sans', sans-serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--md-sys-color-on-surface);
}
.dialog-subtitle {
  font-size: 13px;
  color: var(--md-sys-color-on-surface-variant);
  margin-top: 4px;
}
.dialog-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
}
.dialog-footer {
  padding: 16px 24px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  border-top: 1px solid var(--md-sys-color-outline-variant);
  flex-shrink: 0;
}

/* ══ FORM ELEMENTS ══════════════════════════════════════════════════════════ */
.form-section {
  margin-bottom: 20px;
}
.form-section-title {
  font-family: 'Google Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--md-sys-color-primary);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--md-sys-color-primary-container);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label {
  font-size: 11px;
  font-weight: 500;
  color: var(--md-sys-color-on-surface-variant);
  text-transform: uppercase;
  letter-spacing: .4px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.field label .req { color: var(--md-sys-color-error); font-size: 10px; }
.md-input {
  background: var(--md-sys-color-surface-variant);
  border: 1px solid var(--md-sys-color-outline);
  border-radius: var(--md-border-radius);
  padding: 8px 12px;
  font-size: 13px;
  font-family: 'Roboto', sans-serif;
  color: var(--md-sys-color-on-surface);
  transition: border-color .2s, background .2s;
  width: 100%;
}
.md-input:focus { outline: none; border-color: var(--md-sys-color-primary); background: var(--md-sys-color-surface); box-shadow: 0 0 0 2px var(--md-sys-color-primary-container); }
.md-input.error { border-color: var(--md-sys-color-error); }
.md-input[readonly] { color: var(--md-sys-color-on-surface-variant); cursor: default; font-style: italic; }
.md-input.auto-filled { background: #e6f4ea; border-color: #1e8e3e; color: #1e8e3e; }
select.md-input { cursor: pointer; }
.radio-group { display: flex; gap: 6px; flex-wrap: wrap; }
.radio-opt input { display: none; }
.radio-opt label {
  padding: 6px 14px;
  border: 1px solid var(--md-sys-color-outline);
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Google Sans', sans-serif;
  color: var(--md-sys-color-on-surface-variant);
  transition: all .15s;
  text-transform: none;
  letter-spacing: 0;
}
.radio-opt input:checked + label {
  border-color: var(--md-sys-color-primary);
  color: var(--md-sys-color-primary);
  background: var(--md-sys-color-primary-container);
}
.field.req-border { border: 1px solid var(--md-sys-color-error); border-radius: var(--md-border-radius); padding: 8px; }

/* ══ ALERT BOXES ════════════════════════════════════════════════════════════ */
.alert-box {
  border-radius: var(--md-border-radius);
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 14px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.alert-error { background: var(--md-sys-color-error-container); color: var(--md-sys-color-error); border: 1px solid #f28b82; }
.alert-success { background: var(--md-sys-color-success-container); color: var(--md-sys-color-success); border: 1px solid #81c995; }
.alert-info { background: var(--md-sys-color-info-container); color: var(--md-sys-color-info); border: 1px solid #aecbfa; }

/* ══ LOADING / EMPTY ════════════════════════════════════════════════════════ */
.state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; gap: 16px; color: var(--md-sys-color-on-surface-variant); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--md-sys-color-outline); border-top-color: var(--md-sys-color-primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.state-icon { font-size: 40px; }
.state-text { font-size: 14px; }

/* ══ CONFIG PANEL ═══════════════════════════════════════════════════════════ */
.cfg-panel {
  background: var(--md-sys-color-surface);
  border-bottom: 1px solid var(--md-sys-color-outline);
  padding: 16px 24px;
  display: none;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.cfg-panel.open { display: flex; }
.cfg-field { display: flex; flex-direction: column; gap: 4px; }
.cfg-field label { font-size: 11px; color: var(--md-sys-color-on-surface-variant); text-transform: uppercase; letter-spacing: .4px; font-weight: 500; }
.cfg-field input {
  background: var(--md-sys-color-surface);
  border: 1px solid var(--md-sys-color-outline);
  color: var(--md-sys-color-on-surface);
  border-radius: var(--md-border-radius);
  padding: 8px 12px;
  font-size: 13px;
  font-family: 'Roboto Mono', monospace;
  width: 280px;
}
.cfg-field input:focus { outline: none; border-color: var(--md-sys-color-primary); }

/* ══ SNACKBAR ═══════════════════════════════════════════════════════════════ */
.snackbar {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #323232;
  color: #fff;
  border-radius: var(--md-border-radius);
  padding: 12px 20px;
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  z-index: 999;
  opacity: 0;
  transition: all .3s;
  white-space: nowrap;
  box-shadow: var(--md-elevation-3);
}
.snackbar.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.snackbar.error { background: var(--md-sys-color-error); }
.snackbar.success { background: var(--md-sys-color-success); }

/* ══ PAGE 2 — BULK EDIT ═════════════════════════════════════════════════════ */
#page2 { display: none; }
.bulk-container { padding: 20px 24px; }
.bulk-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.bulk-title { font-family: 'Google Sans', sans-serif; font-size: 18px; font-weight: 500; }

/* Spreadsheet-like table */
.bulk-sheet {
  border: 1px solid var(--md-sys-color-outline);
  border-radius: var(--md-border-radius-lg);
  overflow: auto;
  background: var(--md-sys-color-surface);
  max-height: calc(100vh - 260px);
}
.bulk-table { border-collapse: collapse; min-width: 100%; }
.bulk-table .col-freeze {
  position: sticky;
  left: 0;
  z-index: 2;
  background: var(--md-sys-color-surface-variant);
}
.bulk-table thead th {
  background: var(--md-sys-color-surface-variant);
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--md-sys-color-on-surface-variant);
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
  border-bottom: 2px solid var(--md-sys-color-outline);
  border-right: 1px solid var(--md-sys-color-outline-variant);
  position: sticky;
  top: 0;
  z-index: 3;
}
.bulk-table thead th.col-freeze { z-index: 4; }
.bulk-table thead th.section-info { background: #e8f0fe; color: #1a73e8; }
.bulk-table thead th.section-trat { background: #fef7e0; color: #b06000; }
.bulk-table thead th.section-disp { background: #f3e8fd; color: #7627bb; }
.bulk-table td {
  padding: 4px 6px;
  border-bottom: 1px solid var(--md-sys-color-outline-variant);
  border-right: 1px solid var(--md-sys-color-outline-variant);
  font-size: 12px;
  vertical-align: middle;
  min-width: 120px;
}
.bulk-table td.td-status { min-width: 60px; text-align: center; font-size: 11px; }
.bulk-table td.td-id { min-width: 160px; background: var(--md-sys-color-surface-variant); font-family: 'Roboto Mono', monospace; font-size: 11px; }
.bulk-input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 12px;
  font-family: 'Roboto', sans-serif;
  color: var(--md-sys-color-on-surface);
  padding: 4px;
  outline: none;
  border-radius: 4px;
}
.bulk-input:focus { background: #e8f0fe; }
.bulk-select {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 12px;

const FORMULA_COLS = new Set([0,3,7,8,9,10,11,12]);

// Status do banco de dados → Modalidade
function detectarModalidade(descStatus) {
  const s = (descStatus||'').toLowerCase();
  if (s.includes('cancelad') || s.includes('cancelou') || s.includes('pacote cancelado')) return 'Cancelado';
  if (s.includes('devolvid') || s.includes('devolução') || s.includes('troca entregue') || s.includes('revisada') || s.includes('reembolso')) return 'Devolução';
  if (s.includes('não foi possível') || s.includes('extraviado') || s.includes('problema com a transportadora') || s.includes('não entregue')) return 'Não Entregue';
  return '';
}

  sheetId: localStorage.getItem('sheetId')||'',
  sheetName: localStorage.getItem('sheetName')||'ATENDIMENTOS',
  apiKey: localStorage.getItem('apiKey')||'',
  clientId: localStorage.getItem('clientId')||''
};

};

  loadData();
}

  if(n===2) buildBulkTable();
}

// ══ LOAD DATA ════════════════════════════════════════════════════════════
async function loadData(){
  if(!cfg.sheetId||!cfg.apiKey){document.getElementById('cfgPanel').classList.add('open');return;}
  document.getElementById('tbody').innerHTML=
    '<tr><td colspan="8"><div class="state-box"><div class="spinner"></div><span class="state-text">Carregando dados...</span></div></td></tr>';
  try{
    const rng=encodeURIComponent(`${cfg.sheetName}!A2:BD`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${rng}?key=${cfg.apiKey}`;
    const res=await fetch(url);
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
    const rows=(await res.json()).values||[];
    allData=rows.map((row,i)=>{
      const r={_row:i+2,_raw:[...row]};
      Object.entries(COL).forEach(([k,ci])=>{r[k]=row[ci]||'';});
      return r;
    });
    renderSummary();render();
    const ativos=allData.filter(r=>!IGNORADOS.includes(r.STATUS));
    document.getElementById('tab1Count').textContent=ativos.length;
    document.getElementById('tab2Count').textContent=ativos.length;
    snack(`${allData.length} registros carregados`,'success');
  }catch(e){
    document.getElementById('tbody').innerHTML=
      `<tr><td colspan="8"><div class="state-box"><div class="state-icon">⚠️</div><div class="state-text" style="color:var(--md-sys-color-error)">${e.message}</div></div></td></tr>`;
    snack(e.message,'error');
  }
}

// ══ SUMMARY ══════════════════════════════════════════════════════════════
const SL=[
  {k:'TRATATIVA ATRASADA',c:'sc-error',l:'ATRASADA'},
  {k:'TRATATIVA ABERTA',c:'sc-warn',l:'ABERTA'},
  {k:'ACOMPANHAR DISPUTA',c:'sc-purple',l:'DISPUTA'},
  {k:'ACOMPANHAR ENVIO',c:'sc-info',l:'ENVIO'},
  {k:'POSSÍVEL EXTRAVIO',c:'sc-error',l:'EXTRAVIO'},
  {k:'AGUARDANDO REEMBOLSO',c:'sc-ok',l:'REEMBOLSO'},
  {k:'EM ATRASO',c:'sc-error',l:'EM ATRASO'},
  {k:'A ENVIAR',c:'sc-ok',l:'A ENVIAR'},
];

function renderSummary(){
  const ativos=allData.filter(r=>!IGNORADOS.includes(r.STATUS));
  const inc=ativos.filter(r=>getMiss(r).length>0);
  let h=`
    <div class="summary-card sc-total" onclick="clearF()"><div class="sc-label">Total Ativos</div><div class="sc-count">${ativos.length}</div></div>
    <div class="summary-card sc-error" onclick="setMiss(true)"><div class="sc-label">Incompletos</div><div class="sc-count">${inc.length}</div></div>`;
  SL.forEach(s=>{
    const n=ativos.filter(r=>r.STATUS===s.k).length;
    if(!n)return;
    h+=`<div class="summary-card ${s.c}" onclick="setSt('${s.k}')"><div class="sc-label">${s.l}</div><div class="sc-count">${n}</div></div>`;
  });
  document.getElementById('summaryRow').innerHTML=h;
}

function setSt(s){document.getElementById('fStatus').value=s;missOnly=false;document.getElementById('btnMiss').classList.remove('active');curPage=1;render();}
function setMiss(v){missOnly=v;document.getElementById('btnMiss').classList.toggle('active',v);curPage=1;render();}
function toggleMiss(){setMiss(!missOnly);}
function clearF(){document.getElementById('fStatus').value='';document.getElementById('fCanal').value='';document.getElementById('srch').value='';missOnly=false;document.getElementById('btnMiss').classList.remove('active');curPage=1;render();}

// ══ TABLE ═════════════════════════════════════════════════════════════════
function render(){
  const s=document.getElementById('srch').value.toLowerCase();
  const sf=document.getElementById('fStatus').value;
  const cf=document.getElementById('fCanal').value;
  filtered=allData.filter(r=>{
    if(IGNORADOS.includes(r.STATUS))return false;
    if(sf&&r.STATUS!==sf)return false;
    if(cf&&r.CANAL!==cf)return false;
    if(missOnly&&getMiss(r).length===0)return false;
    if(s&&!`${r.ID_VENDA} ${r.NOME} ${r.SKU} ${r.CANAL} ${r.MODALIDADE}`.toLowerCase().includes(s))return false;
    return true;
  });
  const tot=filtered.length;
  const tp=Math.ceil(tot/PG)||1;
  if(curPage>tp)curPage=1;
  const st=(curPage-1)*PG;
  const pg=filtered.slice(st,st+PG);

  const chipClass={
    'TRATATIVA ABERTA':'chip chip-tratativa-aberta',
    'TRATATIVA ATRASADA':'chip chip-tratativa-atrasada',
    'ACOMPANHAR DISPUTA':'chip chip-acompanhar-disputa',
    'ACOMPANHAR ENVIO':'chip chip-acompanhar-envio',
    'POSSÍVEL EXTRAVIO':'chip chip-possivel-extravio',
    'AGUARDANDO REEMBOLSO':'chip chip-aguardando-reembolso',
    'EM ATRASO':'chip chip-em-atraso',
    'A ENVIAR':'chip chip-a-enviar',
    'CONCLUÍDO':'chip chip-concluido'
  };

  if(!pg.length){
    document.getElementById('tbody').innerHTML='<tr><td colspan="8"><div class="state-box"><div class="state-icon">📭</div><div class="state-text">Nenhum registro encontrado</div></div></td></tr>';
    document.getElementById('pag').innerHTML='';return;
  }

  let h='';
  pg.forEach(r=>{
    const m=getMiss(r).length;
    const cc=chipClass[r.STATUS]||'chip';
    const enc=encodeURIComponent(JSON.stringify(r));
    h+=`<tr>
      <td><span class="${cc}">${r.STATUS||'—'}</span>${m?`<div class="miss-badge">⚠ ${m} campo(s)</div>`:''}</td>
      <td class="mono">${r.ID_VENDA||'—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.NOME||'—'}</td>
      <td><span class="chip chip-canal">${r.CANAL||'—'}</span></td>
      <td>${r.MODALIDADE||'—'}</td>
      <td class="mono" style="font-size:11px">${r.SKU||'—'}</td>
      <td style="color:var(--md-sys-color-on-surface-variant)">${r.DATA_VENDA||'—'}</td>
      <td><button class="btn btn-outlined btn-sm" onclick="openModal(JSON.parse(decodeURIComponent('${enc}')))">✏ Editar</button></td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML=h;

  let p=`<span class="pg-info">${st+1}–${Math.min(st+PG,tot)} de ${tot}</span>`;
  p+=`<button class="pg-btn" onclick="goP(${curPage-1})" ${curPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=tp;i++){
    if(tp<=7||i===1||i===tp||Math.abs(i-curPage)<=1)
      p+=`<button class="pg-btn ${i===curPage?'active':''}" onclick="goP(${i})">${i}</button>`;
    else if(Math.abs(i-curPage)===2)p+=`<button class="pg-btn" disabled>…</button>`;
  }
  p+=`<button class="pg-btn" onclick="goP(${curPage+1})" ${curPage===tp?'disabled':''}>›</button>`;
  document.getElementById('pag').innerHTML=p;
}

function goP(p){const tp=Math.ceil(filtered.length/PG)||1;if(p<1||p>tp)return;curPage=p;render();}

// ══ AUTOPREENCHIMENTO DO BANCO DE DADOS ══════════════════════════════════
async function autoFill(idVenda, canal){
  const tabMap={
    'Mercado Livre':'Mercado Livre',
    'Shopee':'Shopee',
    'Amazon':'Amazon',
    'Magalu':'Magalu'
  };
  const aba=tabMap[canal];
  if(!aba||!cfg.apiKey) return;

  try{
    const rng=encodeURIComponent(`${aba}!A:AZ`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${BANCO_ID}/values/${rng}?key=${cfg.apiKey}`;
    const res=await fetch(url);
    if(!res.ok) return;
    const json=await res.json();
    const rows=json.values||[];
    if(!rows.length) return;

    // Primeira coluna é A (ID Venda) — busca a linha correspondente
    const header=rows[0]||[];
    const dataRows=rows.slice(1);
    const found=dataRows.find(row=>(row[0]||'').trim()===idVenda.trim());
    if(!found){ snack('ID de venda não encontrado no banco de dados','error'); return; }

    // Mapeamento de campos do banco → campos do atendimento
    // Coluna A = ID Venda, precisa mapear por nome de coluna
    const hIdx=(name)=>header.findIndex(h=>(h||'').trim().toLowerCase()===name.toLowerCase());

    const nome=found[hIdx('Comprador 1')]||found[hIdx('Nome')]||found[hIdx('comprador')]||'';
    const dataVenda=found[hIdx('Data Venda')]||found[hIdx('Data da venda')]||found[hIdx('Data')]||'';
    const sku=found[hIdx('SKU')]||'';
    const qt=found[hIdx('Unidades')]||found[hIdx('QT')]||'';
    const rastreio=found[hIdx('Número de rastreamento')]||found[hIdx('Rastreio')]||'';
    const idBling=found[hIdx('ID VENDA BLING')]||found[hIdx('ID Venda no Bling')]||'';
    const descStatus=found[hIdx('Estado')]||found[hIdx('Descrição de Status')]||found[hIdx('Status')]||'';
    const nf=found[hIdx('NF')]||'';
    const nfDevol=found[hIdx('NF Entrada')]||'';
    const modalidade=detectarModalidade(descStatus);

    // Preenche os campos readonly visualmente
    const setRO=(id,val)=>{ const el=document.getElementById(`f_${id}`); if(el){ el.value=val; if(val) el.classList.add('auto-filled'); else el.classList.remove('auto-filled'); }};
    const setVal=(id,val)=>{ const el=document.getElementById(`f_${id}`); if(el&&!el.value) el.value=val; };

    setRO('NOME',nome);
    setRO('DATA_VENDA',dataVenda);
    setRO('SKU',sku);
    setRO('QT',qt);
    setRO('RASTREIO',rastreio);
    setRO('ID_BLING',idBling);
    setRO('DESC_STATUS',descStatus);
    setVal('NF',nf);
    setVal('NF_DEVOL',nfDevol);

    // Preenche modalidade se detectada
    if(modalidade){
      const mSel=document.getElementById('f_MODALIDADE');
      if(mSel&&!mSel.value) mSel.value=modalidade;
    }

    snack(`✓ Dados preenchidos automaticamente para ${idVenda}`,'success');
  }catch(e){ console.error('AutoFill error:',e); }
}

}
function fr(id,lbl,val){
  return `<div class="field"><label>${lbl}</label>
    <input type="text" id="f_${id}" class="md-input ${val?'auto-filled':''}" value="${(val||'').replace(/"/g,'&quot;')}" readonly></div>`;
}
function fs(id,lbl,val,opts,req=false,isNew=false){

  const o=opts.map(v=>`<option value="${v}" ${val===v?'selected':''}>${v||'— Selecione —'}</option>`).join('');

    <select id="f_${id}" class="md-input ${err}">${o}</select></div>`;
}
function fy(id,lbl,val,req=false){

// ══ SAVE ══════════════════════════════════════════════════════════════════
async function saveRecord(){
  const get=id=>{
    const el=document.getElementById(`f_${id}`);
    if(el)return el.value;
    for(const r of document.querySelectorAll(`input[name="f_${id}"]`))if(r.checked)return r.value;
    return '';
  };
  const novos={};
  EDIT_COLS.forEach(({key})=>{novos[key]=get(key)||'';});

  // Validação
  const miss=['ID_VENDA','CANAL','EMPR','MODELO','DEVOLUCAO_ABERTA','NEC_PECAS','DISPUTA_ABERTA','TRATATIVA_FINALIZADA'].filter(f=>!novos[f]);
  if(['Devolução','Mensagem','Reclamação'].includes(novos.MODALIDADE)&&!novos.MOTIVO)miss.push('MOTIVO');
  if(novos.DISPUTA_ABERTA==='SIM'&&!novos.DISPUTA_FINALIZADA)miss.push('DISPUTA_FINALIZADA');
  if(novos.DISPUTA_FINALIZADA==='SIM'&&!novos.REEMBOLSO_MKT)miss.push('REEMBOLSO_MKT');
  if(novos.REEMBOLSO_MKT==='SIM'&&!novos.CREDITO)miss.push('CREDITO');
  if(miss.length){snack(`Preencha: ${miss.map(f=>ML[f]||f).join(', ')},'error'`);return;}

  const tkn=await getToken();
  if(!tkn){snack('Configure o Client ID OAuth para salvar','error');return;}

  const isNew=!curRec;
  if(isNew){
    // Novo registro: captura também os campos autopreenchidos do banco
    const getAny=id=>{ const el=document.getElementById(`f_${id}`); return el?el.value:''; };
    const mx=Math.max(...Object.values(COL))+1;
    const row=new Array(mx).fill('');
    EDIT_COLS.forEach(({key,idx})=>{row[idx]=novos[key]||'';});
    // Campos de fórmula visíveis (readonly) — não gravar (a fórmula vai preencher)
    row[COL.STATUS]='';
    try{
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${encodeURIComponent(cfg.sheetName+'!A:BD')}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${tkn}`},body:JSON.stringify({values:[row]})});
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
      snack('Registro criado!','success');closeDlg();loadData();
    }catch(e){snack('Erro: '+e.message,'error');}
  } else {
    // Edição: batchUpdate somente células alteradas
    const rowN=curRec._row;
    const data=[];
    EDIT_COLS.forEach(({key,idx})=>{
      const oldV=curRec[key]||'';
      const newV=novos[key]||'';
      if(oldV===newV)return;
      data.push({range:`${cfg.sheetName}!${n2c(idx)}${rowN}`,values:[[newV]]});
    });
    if(!data.length){snack('Nenhuma alteração detectada','success');closeDlg();return;}
    try{
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values:batchUpdate`;
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${tkn}`},body:JSON.stringify({valueInputOption:'USER_ENTERED',data})});
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
      snack(`${data.length} campo(s) salvos!`,'success');closeDlg();loadData();
    }catch(e){snack('Erro: '+e.message,'error');}
  }
}

    {k:'REEMBOLSO_MKT',l:'Reembolso Mkt?',type:'yn'},
    {k:'DISPUTA_FINALIZADA',l:'Disputa Final?',type:'yn'},
    {k:'CREDITO_RECEBIDO_VALOR',l:'R$ Crédito Rec.',type:'text'},
    {k:'CREDITO_RECEBIDO',l:'Crédito Rec.?',type:'yn'},
    {k:'OBS_DISPUTA',l:'Obs. Disputa',type:'text'},
  ];

  // Build header
  let thead=`<tr>
    <th class="col-freeze" style="min-width:50px">Linha</th>
    <th class="col-freeze" style="min-width:170px;left:50px">ID Venda</th>
    <th style="min-width:120px">Status</th>
    <th style="min-width:140px">Nome</th>
    <th style="min-width:110px">Canal</th>
    <th class="section-info" colspan="${INFO_COLS.length}">📦 Informações</th>
    <th class="section-trat" colspan="${TRAT_COLS.length}">🗂 Tratativa</th>
    <th class="section-disp" colspan="${DISP_COLS.length}">⚖️ Disputa</th>
  </tr><tr>
    <th class="col-freeze"></th>
    <th class="col-freeze" style="left:50px"></th>
    <th></th><th></th><th></th>`;
  INFO_COLS.forEach(c=>{ thead+=`<th class="section-info">${c.l}</th>`; });
  TRAT_COLS.forEach(c=>{ thead+=`<th class="section-trat">${c.l}</th>`; });
  DISP_COLS.forEach(c=>{ thead+=`<th class="section-disp">${c.l}</th>`; });
  thead+='</tr>';
  document.getElementById('bulkHead').innerHTML=thead;

  const chipClass={'TRATATIVA ABERTA':'chip chip-tratativa-aberta','TRATATIVA ATRASADA':'chip chip-tratativa-atrasada','ACOMPANHAR DISPUTA':'chip chip-acompanhar-disputa','ACOMPANHAR ENVIO':'chip chip-acompanhar-envio','POSSÍVEL EXTRAVIO':'chip chip-possivel-extravio','AGUARDANDO REEMBOLSO':'chip chip-aguardando-reembolso','EM ATRASO':'chip chip-em-atraso','A ENVIAR':'chip chip-a-enviar'};

  const renderCell=(r,i,c)=>{
    const val=r[c.k]||'';
    const uid=`bulk_${i}_${c.k}`;
    if(c.type==='select'){
      const opts=c.opts.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o||'—'}</option>`).join('');
      return `<td><select class="bulk-select" id="${uid}" onchange="bulkChange(${i},'${c.k}',this.value)">${opts}</select></td>`;
    }
    if(c.type==='yn'){
      const opts=['','SIM','NÃO'].map(o=>`<option value="${o}" ${val===o?'selected':''}>${o||'—'}</option>`).join('');
      return `<td><select class="bulk-select" id="${uid}" onchange="bulkChange(${i},'${c.k}',this.value)">${opts}</select></td>`;
    }
    return `<td><input class="bulk-input" id="${uid}" value="${(val||'').replace(/"/g,'&quot;')}" onchange="bulkChange(${i},'${c.k}',this.value)"></td>`;
  };

  let tbody='';
  ativos.forEach((r,i)=>{
    const cc=chipClass[r.STATUS]||'';
    tbody+=`<tr id="bulk_row_${i}">
      <td class="td-status col-freeze">${r._row}</td>
      <td class="td-id col-freeze" style="left:50px">${r.ID_VENDA||'—'}</td>
      <td><span class="${cc}" style="font-size:10px;padding:2px 6px">${r.STATUS||'—'}</span></td>
      <td style="font-size:11px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis">${r.NOME||'—'}</td>
      <td><span class="chip chip-canal" style="font-size:10px">${r.CANAL||'—'}</span></td>`;
    INFO_COLS.forEach(c=>{ tbody+=renderCell(r,i,c); });
    TRAT_COLS.forEach(c=>{ tbody+=renderCell(r,i,c); });
    DISP_COLS.forEach(c=>{ tbody+=renderCell(r,i,c); });
    tbody+='</tr>';
  });
  document.getElementById('bulkBody').innerHTML=tbody;
  updateBulkInfo();
}

function bulkChange(i,key,val){
  if(!bulkChanges[i]) bulkChanges[i]={};
  const orig=bulkOriginal[i][key]||'';
  if(val===orig){ delete bulkChanges[i][key]; if(!Object.keys(bulkChanges[i]).length) delete bulkChanges[i]; }
  else bulkChanges[i][key]=val;
  const row=document.getElementById(`bulk_row_${i}`);
  if(row) row.className=bulkChanges[i]?'changed':'';
  updateBulkInfo();
}

function updateBulkInfo(){
  const n=Object.keys(bulkChanges).length;
  document.getElementById('bulkChangedInfo').textContent=n?`${n} linha(s) com alterações pendentes`:'';
}

function bulkReset(){
  bulkChanges={};
  buildBulkTable();
  snack('Alterações desfeitas');
}

async function bulkSave(){
  const keys=Object.keys(bulkChanges);
  if(!keys.length){snack('Nenhuma alteração para salvar');return;}
  const tkn=await getToken();
  if(!tkn){snack('Configure o Client ID OAuth para salvar','error');return;}

  const data=[];
  keys.forEach(i=>{
    const r=bulkOriginal[i];
    const rowN=r._row;
    Object.entries(bulkChanges[i]).forEach(([key,val])=>{
      const idx=COL[key];
      if(idx===undefined||FORMULA_COLS.has(idx))return;
      data.push({range:`${cfg.sheetName}!${n2c(idx)}${rowN}`,values:[[val]]});
    });
  });

  if(!data.length){snack('Nenhum campo editável para salvar');return;}
  try{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values:batchUpdate`;
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${tkn}`},body:JSON.stringify({valueInputOption:'USER_ENTERED',data})});
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
    snack(`${data.length} célula(s) salvas em ${keys.length} linha(s)!`,'success');
    bulkChanges={};
    loadData();
  }catch(e){snack('Erro: '+e.message,'error');}
}

// ══ UTILS ════════════════════════════════════════════════════════════════
function n2c(n){let s='';n++;while(n>0){n--;s=String.fromCharCode(65+(n%26))+s;n=Math.floor(n/26);}return s;}

async function getToken(){
  const st=sessionStorage.getItem('gToken');
  if(st)return st;
  if(!cfg.clientId){snack('Informe o Client ID OAuth','error');return null;}
  return new Promise(resolve=>{
    const sc='https://www.googleapis.com/auth/spreadsheets';
    const uri=window.location.origin+window.location.pathname;
    const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${cfg.clientId}&redirect_uri=${encodeURIComponent(uri)}&response_type=token&scope=${encodeURIComponent(sc)}`;
    const pop=window.open(url,'oauth','width=500,height=600');
    const iv=setInterval(()=>{
      try{const h=pop?.location?.hash;if(h?.includes('access_token')){const t=new URLSearchParams(h.replace('#','?')).get('access_token');sessionStorage.setItem('gToken',t);pop.close();clearInterval(iv);resolve(t);}}catch(e){}
      if(pop?.closed){clearInterval(iv);resolve(null);}
    },500);
  });
}

function snack(msg,type=''){
  const t=document.getElementById('snack');
  t.textContent=msg;t.className=`snackbar ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3500);
}
</script>
